name: jayshree_foundation
description: Jayshree Foundation - NGO Volunteer Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^13.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
